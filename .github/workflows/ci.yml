name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly (Mon 06:00 UTC) — catch upstream drift (Homebrew/tool changes)
    # even without a commit, so the kit doesn't silently bit-rot.
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: shellcheck + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: bash syntax (3.2-safe parse)
        run: |
          for f in install.sh uninstall.sh scripts/*.sh config/zshrc.block.sh; do
            bash -n "$f"
          done
      - name: shellcheck
        run: shellcheck -x -S warning -e SC2154 install.sh uninstall.sh scripts/*.sh

  lint-linux:
    name: linux shellcheck + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: bash syntax
        run: |
          for f in linux/install.sh linux/uninstall.sh linux/scripts/*.sh linux/config/zshrc.block.sh; do
            bash -n "$f"
          done
      - name: shellcheck
        run: shellcheck -x -S warning -e SC2154 linux/install.sh linux/uninstall.sh linux/scripts/*.sh

  linux-e2e:
    name: linux install -> uninstall (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install (non-interactive; skip Docker; HERMES off for speed)
        env:
          HERMES: "0"
        run: ./linux/install.sh --yes --skip docker

      - name: verify installed
        run: |
          set -uo pipefail
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.bun/bin:$HOME/.local/share/mise/shims:$PATH"
          fail=0
          need() { command -v "$1" >/dev/null 2>&1 && echo "ok   $1" || { echo "MISS $1"; fail=1; }; }
          for t in rg fd bat fzf jq gh starship mise uv bun rustup zsh; do need "$t"; done
          for t in node go python; do
            mise which "$t" >/dev/null 2>&1 && echo "ok   mise:$t" || { echo "MISS mise:$t"; fail=1; }
          done
          command -v ast-grep >/dev/null 2>&1 && echo "ok   ast-grep" || { echo "MISS ast-grep"; fail=1; }
          for t in gjc codex; do need "$t"; done
          grep -q 'lazy-starter-kit:main' "$HOME/.zshrc" && echo "ok   zshrc block" || { echo "MISS zshrc block"; fail=1; }
          exit $fail

      - name: uninstall (teardown)
        run: ./linux/uninstall.sh --yes --with-gajae --skip docker

      - name: verify removed
        run: |
          if grep -q 'lazy-starter-kit' "$HOME/.zshrc" 2>/dev/null; then
            echo "STILL zshrc block"; exit 1
          fi
          echo "ok   zshrc block removed"

  linux-e2e-distros:
    # The README claims Fedora/Arch/openSUSE are verified end-to-end; this job
    # makes CI actually cover them (Ubuntu is covered by linux-e2e above).
    name: linux install -> uninstall (${{ matrix.image }})
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        image:
          - fedora:latest
          - archlinux:latest
          - opensuse/tumbleweed
    steps:
      # These minimal base images ship bash/curl/tar/gzip but NOT git. Install
      # git so actions/checkout uses git (its REST-tarball fallback would also
      # work via tar+gzip, but git is more robust). Containers run as root and
      # have no sudo — the kit's SUDO="" root path handles that fine.
      - name: bootstrap container (git for checkout)
        shell: bash
        run: |
          set -eux
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y git tar gzip
          elif command -v pacman >/dev/null 2>&1; then
            # Arch: a bare 'pacman -Sy' is a partial-upgrade hazard, so do a full
            # -Syu (the installer runs the same upgrade anyway under --yes).
            pacman -Syu --noconfirm git tar
          elif command -v zypper >/dev/null 2>&1; then
            zypper --non-interactive install git tar gzip
          fi
          # opensuse/tumbleweed's image config defines NO PATH env. Once a later
          # installer (bun/uv/rustup in the kit's install step) prepends to
          # GITHUB_PATH, the runner rebuilds the step PATH from that empty base
          # and `docker exec` can no longer even find `sh` (exit 127). Seed the
          # system dirs via GITHUB_PATH (the runner ignores PATH set through
          # GITHUB_ENV) so every later rebuild keeps them.
          echo "$PATH" | tr ':' '\n' >> "$GITHUB_PATH"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install (non-interactive; skip Docker; HERMES off for speed)
        env:
          HERMES: "0"
        run: ./linux/install.sh --yes --skip docker

      - name: verify installed
        run: |
          set -uo pipefail
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/.bun/bin:$HOME/.local/share/mise/shims:$PATH"
          fail=0
          need() { command -v "$1" >/dev/null 2>&1 && echo "ok   $1" || { echo "MISS $1"; fail=1; }; }
          for t in rg fd bat fzf jq gh starship mise uv bun rustup zsh; do need "$t"; done
          for t in node go python; do
            mise which "$t" >/dev/null 2>&1 && echo "ok   mise:$t" || { echo "MISS mise:$t"; fail=1; }
          done
          command -v ast-grep >/dev/null 2>&1 && echo "ok   ast-grep" || { echo "MISS ast-grep"; fail=1; }
          for t in gjc codex; do need "$t"; done
          grep -q 'lazy-starter-kit:main' "$HOME/.zshrc" && echo "ok   zshrc block" || { echo "MISS zshrc block"; fail=1; }
          exit $fail

      - name: uninstall (teardown)
        run: ./linux/uninstall.sh --yes --with-gajae --skip docker

      - name: verify removed
        run: |
          if grep -q 'lazy-starter-kit' "$HOME/.zshrc" 2>/dev/null; then
            echo "STILL zshrc block"; exit 1
          fi
          echo "ok   zshrc block removed"

  lint-windows:
    name: windows powershell parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: parse all .ps1 (PowerShell is preinstalled on the runner)
        shell: pwsh
        run: |
          $fail = 0
          Get-ChildItem -Path windows -Recurse -Include *.ps1 | ForEach-Object {
            $tokens = $null; $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              $fail = 1
              Write-Host "FAIL $($_.FullName)"
              $errors | ForEach-Object { Write-Host "  $($_.Message) (line $($_.Extent.StartLineNumber))" }
            } else { Write-Host "ok   $($_.Name)" }
          }
          exit $fail
      - name: PSScriptAnalyzer (warnings+errors)
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $res = Invoke-ScriptAnalyzer -Path windows -Recurse -Severity Warning,Error
          $res | Format-Table -AutoSize
          if ($res | Where-Object { $_.Severity -eq 'Error' }) { exit 1 }

  dryrun:
    name: macOS dry-run
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: ./install.sh --dry-run
      - run: ./uninstall.sh --dry-run --yes

  integration:
    name: macOS install -> uninstall
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install (non-interactive)
        # plain run: non-tty so Colima start is auto-declined; everything else runs.
        # HERMES=0 skips the heavy external Hermes installer to keep CI lean
        # (its wiring is still covered by the dry-run job).
        run: HERMES=0 ./install.sh

      - name: verify installed
        run: |
          set -euo pipefail
          eval "$(/opt/homebrew/bin/brew shellenv)"
          export PATH="$HOME/.local/share/mise/shims:$HOME/.bun/bin:/opt/homebrew/opt/rustup/bin:$PATH"
          fail=0
          need() { command -v "$1" >/dev/null 2>&1 && echo "ok   $1" || { echo "MISS $1"; fail=1; }; }
          for t in mise starship rg fd fzf bat gh colima mo node python go rustc gjc codex; do need "$t"; done
          echo "node:   $(node -v)"
          echo "python: $(python --version)"
          echo "go:     $(go version)"
          echo "codex:  $(codex --version 2>/dev/null | head -1 || echo '?')"
          test -d "$HOME/.oh-my-zsh"            || { echo "MISS oh-my-zsh"; fail=1; }
          grep -q 'lazy-starter-kit:main' "$HOME/.zshrc" || { echo "MISS zshrc block"; fail=1; }
          test -d "$HOME/.codex/plugins/cache/sisyphuslabs/omo" && echo "ok   lazycodex/omo" || echo "warn lazycodex/omo not found"
          exit $fail

      - name: uninstall (full teardown)
        run: ./uninstall.sh --yes --with-gajae

      - name: verify removed
        run: |
          set -euo pipefail
          eval "$(/opt/homebrew/bin/brew shellenv)" || true
          export PATH="$HOME/.local/share/mise/shims:$HOME/.bun/bin:$PATH"
          fail=0
          gone() { command -v "$1" >/dev/null 2>&1 && { echo "STILL $1"; fail=1; } || echo "gone $1"; }
          for t in gjc codex starship mise; do gone "$t"; done
          test -d "$HOME/.oh-my-zsh" && { echo "STILL oh-my-zsh"; fail=1; } || echo "gone oh-my-zsh"
          if grep -q 'lazy-starter-kit' "$HOME/.zshrc" 2>/dev/null; then echo "STILL zshrc block"; fail=1; else echo "gone zshrc block"; fi
          test -x /opt/homebrew/bin/brew && echo "ok   Homebrew preserved" || { echo "Homebrew missing!"; fail=1; }
          exit $fail

  windows-e2e:
    name: windows install -> uninstall
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: check winget (preinstalled on windows-2025 image)
        shell: pwsh
        run: winget --version

      - name: install (non-interactive; skip Docker Desktop; Hermes n/a on Windows)
        shell: pwsh
        run: .\windows\install.ps1 -Yes -Skip docker

      - name: verify installed
        shell: pwsh
        run: |
          $env:Path = [Environment]::GetEnvironmentVariable('Path','Machine') + ';' +
                      [Environment]::GetEnvironmentVariable('Path','User') + ';' +
                      "$env:USERPROFILE\.cargo\bin;$env:USERPROFILE\.bun\bin;$env:LOCALAPPDATA\mise\shims"
          $fail = 0
          function need($c) {
            if (Get-Command $c -ErrorAction SilentlyContinue) { Write-Host "ok   $c" }
            else { Write-Host "MISS $c"; $script:fail = 1 }
          }
          foreach ($t in 'git','gh','jq','rg','fd','bat','fzf','starship','mise','uv','rustup','bun') { need $t }
          & mise reshim 2>$null
          foreach ($t in 'node','go','python') {
            $p = (& mise which $t 2>$null)
            if ($p) { Write-Host "ok   mise:$t" } else { Write-Host "warn mise:$t not resolved" }
          }
          & mise reshim 2>$null
          $env:Path += ";$env:LOCALAPPDATA\mise\shims;$env:USERPROFILE\.bun\bin"
          foreach ($t in 'gjc','codex') {
            if (Get-Command $t -ErrorAction SilentlyContinue) { Write-Host "ok   $t" }
            else { Write-Host "MISS $t"; $fail = 1 }
          }
          $prof = $PROFILE.CurrentUserAllHosts
          if ((Test-Path $prof) -and (Select-String -Path $prof -SimpleMatch 'lazy-starter-kit:main' -Quiet)) {
            Write-Host "ok   profile block"
          } else { Write-Host "MISS profile block"; $fail = 1 }
          exit $fail

      - name: uninstall (teardown)
        shell: pwsh
        run: .\windows\uninstall.ps1 -Yes -WithGajae

      - name: verify removed
        shell: pwsh
        run: |
          $prof = $PROFILE.CurrentUserAllHosts
          if ((Test-Path $prof) -and (Select-String -Path $prof -SimpleMatch 'lazy-starter-kit' -Quiet)) {
            Write-Host "STILL profile block"; exit 1
          }
          Write-Host "ok   profile block removed"
